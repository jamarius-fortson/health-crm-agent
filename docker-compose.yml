version: "3.9"

services:
  # -------------------------------------------------------------------------
  # PostgreSQL + pgvector — primary application database
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hcrm
      POSTGRES_PASSWORD: hcrm_password
      POSTGRES_DB: hcrm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hcrm -d hcrm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # PostgreSQL — immutable audit log (separate database, RLS enforced)
  # -------------------------------------------------------------------------
  postgres-audit:
    image: postgres:16
    environment:
      POSTGRES_USER: hcrm_audit
      POSTGRES_PASSWORD: hcrm_audit_password
      POSTGRES_DB: hcrm_audit_db
    ports:
      - "5433:5432"
    volumes:
      - audit_data:/var/lib/postgresql/data
      - ./init-audit.sql:/docker-entrypoint-initdb.d/01-audit-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hcrm_audit -d hcrm_audit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis — short-term memory + task queue
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass hcrm_redis_password
      --tls-port 6380
      --port 0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "hcrm_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Application
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-audit:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn healthcare_agent.api.app:app --host 0.0.0.0 --port 8000 --reload

  # -------------------------------------------------------------------------
  # Dashboard (React)
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - app

volumes:
  postgres_data:
  audit_data:
  redis_data:
